backend:
  name: github
  repo: aliekberayric-ai.github.io/MissLeZet
  branch: main

media_folder: images/gallery
public_folder: images/gallery

collections:
  - name: site
    label: Website Inhalte
    files:
      - file: content.json
        label: Inhalte (DE/TR/EN)
        name: content
        format: json
        fields:
          - label: Brand
            name: brand
            widget: object
            fields:
              - label: Website Name
                name: name
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: string
                  - label: TR
                    name: tr
                    widget: string
                  - label: EN
                    name: en
                    widget: string

              - label: Tagline
                name: tagline
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: string
                  - label: TR
                    name: tr
                    widget: string
                  - label: EN
                    name: en
                    widget: string

          - label: Kontakt
            name: contact
            widget: object
            fields:
              - label: Stadt/Ort
                name: city
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: string
                  - label: TR
                    name: tr
                    widget: string
                  - label: EN
                    name: en
                    widget: string

              - label: Telefon
                name: phone
                widget: object
                required: false
                fields:
                  - label: DE
                    name: de
                    widget: string
                    required: false
                  - label: TR
                    name: tr
                    widget: string
                    required: false
                  - label: EN
                    name: en
                    widget: string
                    required: false

              - label: E-Mail
                name: email
                widget: string
                required: false

          - label: Hero
            name: hero
            widget: object
            fields:
              - label: Kicker
                name: kicker
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: string
                  - label: TR
                    name: tr
                    widget: string
                  - label: EN
                    name: en
                    widget: string

              - label: Headline
                name: headline
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: string
                  - label: TR
                    name: tr
                    widget: string
                  - label: EN
                    name: en
                    widget: string

              - label: Text
                name: sub
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: text
                  - label: TR
                    name: tr
                    widget: text
                  - label: EN
                    name: en
                    widget: text

          - label: Über uns
            name: about
            widget: object
            fields:
              - label: Text
                name: text
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: text
                  - label: TR
                    name: tr
                    widget: text
                  - label: EN
                    name: en
                    widget: text

              - label: Bullets
                name: bullets
                widget: object
                fields:
                  - label: DE
                    name: de
                    widget: list
                    field:
                      label: Bullet
                      widget: string
                  - label: TR
                    name: tr
                    widget: list
                    field:
                      label: Bullet
                      widget: string
                  - label: EN
                    name: en
                    widget: list
                    field:
                      label: Bullet
                      widget: string

          - label: Impressum (HTML)
            name: imprintHtml
            widget: object
            fields:
              - label: DE
                name: de
                widget: text
              - label: TR
                name: tr
                widget: text
              - label: EN
                name: en
                widget: text

          - label: Preise
            name: pricing
            widget: object
            fields:
              - label: DE
                name: de
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Kategorie
                    name: title
                    widget: string
                  - label: Hinweis
                    name: hint
                    widget: string
                    required: false
                  - label: Positionen
                    name: items
                    widget: list
                    fields:
                      - label: Label
                        name: label
                        widget: string
                      - label: Preis
                        name: value
                        widget: string

              - label: TR
                name: tr
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Kategorie
                    name: title
                    widget: string
                  - label: Hinweis
                    name: hint
                    widget: string
                    required: false
                  - label: Positionen
                    name: items
                    widget: list
                    fields:
                      - label: Label
                        name: label
                        widget: string
                      - label: Preis
                        name: value
                        widget: string

              - label: EN
                name: en
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Kategorie
                    name: title
                    widget: string
                  - label: Hinweis
                    name: hint
                    widget: string
                    required: false
                  - label: Positionen
                    name: items
                    widget: list
                    fields:
                      - label: Label
                        name: label
                        widget: string
                      - label: Preis
                        name: value
                        widget: string

          # ====== PAKETE + BUILDER (NEU: Preview-Bild pro Speise) ======
          - label: Pakete
            name: packages
            widget: object
            fields:
              - label: DE
                name: de
                widget: list
                summary: "{{fields.title}} — {{fields.price}}"
                fields:
                  - label: Titel
                    name: title
                    widget: string
                  - label: Preis
                    name: price
                    widget: string
                  - label: Badge (optional)
                    name: badge
                    widget: string
                    required: false
                  - label: Beschreibung
                    name: desc
                    widget: text
                  - label: Features
                    name: features
                    widget: list
                    field:
                      label: Feature
                      widget: string
                  - label: Bild (optional)
                    name: image
                    widget: image
                    required: false

                  - label: Paket-Konfigurator (Popup)
                    name: builder
                    widget: object
                    required: false
                    fields:
                      - label: Währung (z.B. EUR)
                        name: currency
                        widget: string
                        required: false
                      - label: Kategorien
                        name: categories
                        widget: list
                        required: false
                        summary: "{{fields.title}}"
                        fields:
                          - label: Kategorie-Titel
                            name: title
                            widget: string
                          - label: Speisen
                            name: items
                            widget: list
                            summary: "{{fields.label}}"
                            fields:
                              - label: Name
                                name: label
                                widget: string
                              - label: Preis pro Person
                                name: price
                                widget: number
                                value_type: float
                                min: 0
                                step: 0.1
                              - label: Preview Bild (klein)
                                name: image
                                widget: image
                                required: false

              - label: TR
                name: tr
                widget: list
                summary: "{{fields.title}} — {{fields.price}}"
                fields:
                  - label: Titel
                    name: title
                    widget: string
                  - label: Preis
                    name: price
                    widget: string
                  - label: Badge (optional)
                    name: badge
                    widget: string
                    required: false
                  - label: Beschreibung
                    name: desc
                    widget: text
                  - label: Features
                    name: features
                    widget: list
                    field:
                      label: Feature
                      widget: string
                  - label: Bild (optional)
                    name: image
                    widget: image
                    required: false

                  - label: Paket-Konfigüratör (Popup)
                    name: builder
                    widget: object
                    required: false
                    fields:
                      - label: Para birimi (örn. EUR)
                        name: currency
                        widget: string
                        required: false
                      - label: Kategoriler
                        name: categories
                        widget: list
                        required: false
                        summary: "{{fields.title}}"
                        fields:
                          - label: Kategori başlığı
                            name: title
                            widget: string
                          - label: Ürünler
                            name: items
                            widget: list
                            summary: "{{fields.label}}"
                            fields:
                              - label: İsim
                                name: label
                                widget: string
                              - label: Kişi başı fiyat
                                name: price
                                widget: number
                                value_type: float
                                min: 0
                                step: 0.1
                              - label: Preview görseli (küçük)
                                name: image
                                widget: image
                                required: false

              - label: EN
                name: en
                widget: list
                summary: "{{fields.title}} — {{fields.price}}"
                fields:
                  - label: Title
                    name: title
                    widget: string
                  - label: Price
                    name: price
                    widget: string
                  - label: Badge (optional)
                    name: badge
                    widget: string
                    required: false
                  - label: Description
                    name: desc
                    widget: text
                  - label: Features
                    name: features
                    widget: list
                    field:
                      label: Feature
                      widget: string
                  - label: Image (optional)
                    name: image
                    widget: image
                    required: false

                  - label: Package Builder (Popup)
                    name: builder
                    widget: object
                    required: false
                    fields:
                      - label: Currency (e.g. EUR)
                        name: currency
                        widget: string
                        required: false
                      - label: Categories
                        name: categories
                        widget: list
                        required: false
                        summary: "{{fields.title}}"
                        fields:
                          - label: Category title
                            name: title
                            widget: string
                          - label: Items
                            name: items
                            widget: list
                            summary: "{{fields.label}}"
                            fields:
                              - label: Name
                                name: label
                                widget: string
                              - label: Price per person
                                name: price
                                widget: number
                                value_type: float
                                min: 0
                                step: 0.1
                              - label: Preview image (small)
                                name: image
                                widget: image
                                required: false

          - label: Mitarbeiter
            name: team
            widget: object
            fields:
              - label: DE
                name: de
                widget: list
                summary: "{{fields.name}} — {{fields.role}}"
                fields:
                  - label: Name
                    name: name
                    widget: string
                  - label: Rolle
                    name: role
                    widget: string
                  - label: Beschreibung
                    name: text
                    widget: text
                  - label: Initialen
                    name: initials
                    widget: string
                    required: false

              - label: TR
                name: tr
                widget: list
                summary: "{{fields.name}} — {{fields.role}}"
                fields:
                  - label: Name
                    name: name
                    widget: string
                  - label: Rolle
                    name: role
                    widget: string
                  - label: Beschreibung
                    name: text
                    widget: text
                  - label: Initialen
                    name: initials
                    widget: string
                    required: false

              - label: EN
                name: en
                widget: list
                summary: "{{fields.name}} — {{fields.role}}"
                fields:
                  - label: Name
                    name: name
                    widget: string
                  - label: Rolle
                    name: role
                    widget: string
                  - label: Beschreibung
                    name: text
                    widget: text
                  - label: Initialen
                    name: initials
                    widget: string
                    required: false

          - label: Menü
            name: menu
            widget: object
            fields:
              - label: DE
                name: de
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Kategorie
                    name: title
                    widget: string
                  - label: Hinweis
                    name: hint
                    widget: string
                    required: false
                  - label: Items
                    name: items
                    widget: list
                    field:
                      label: Item
                      widget: string

              - label: TR
                name: tr
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Kategorie
                    name: title
                    widget: string
                  - label: Hinweis
                    name: hint
                    widget: string
                    required: false
                  - label: Items
                    name: items
                    widget: list
                    field:
                      label: Item
                      widget: string

              - label: EN
                name: en
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Kategorie
                    name: title
                    widget: string
                  - label: Hinweis
                    name: hint
                    widget: string
                    required: false
                  - label: Items
                    name: items
                    widget: list
                    field:
                      label: Item
                      widget: string

          - label: Galerie
            name: gallery
            widget: object
            fields:
              - label: DE
                name: de
                widget: list
                summary: "{{fields.caption}}"
                fields:
                  - label: Bild
                    name: image
                    widget: image
                  - label: Titel
                    name: caption
                    widget: string

              - label: TR
                name: tr
                widget: list
                summary: "{{fields.caption}}"
                fields:
                  - label: Bild
                    name: image
                    widget: image
                  - label: Titel
                    name: caption
                    widget: string

              - label: EN
                name: en
                widget: list
                summary: "{{fields.caption}}"
                fields:
                  - label: Bild
                    name: image
                    widget: image
                  - label: Titel
                    name: caption
                    widget: string

          - label: Social Proof
            name: social
            widget: object
            fields:
              - label: DE
                name: de
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Titel
                    name: title
                    widget: string
                  - label: Text
                    name: text
                    widget: string

              - label: TR
                name: tr
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Titel
                    name: title
                    widget: string
                  - label: Text
                    name: text
                    widget: string

              - label: EN
                name: en
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: Titel
                    name: title
                    widget: string
                  - label: Text
                    name: text
                    widget: string
